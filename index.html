<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport Village</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="hero">
    <header class="site-header">
      <img
        class="site-logo"
        src="Logotype_Compact_WH.png"
        alt="Sport Village"
      >
    </header>

    <section class="hero-content">
      <div class="signup-box">
        <form class="signup-form">
          <input
            class="signup-input"
            type="email"
            name="email"
            placeholder="Inserisci la tua email"
            aria-label="Inserisci la tua email"
          >
          <button class="signup-button" type="button">Invia</button>
        </form>
        <a
          class="instagram-link"
          href="https://www.instagram.com/sportsvillagesora/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram Sport Village Sora"
        >
          <svg class="instagram-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.75 2H16.25C19.56 2 22 4.44 22 7.75V16.25C22 19.56 19.56 22 16.25 22H7.75C4.44 22 2 19.56 2 16.25V7.75C2 4.44 4.44 2 7.75 2ZM7.55 4A3.56 3.56 0 0 0 4 7.55V16.45A3.56 3.56 0 0 0 7.55 20H16.45A3.56 3.56 0 0 0 20 16.45V7.55A3.56 3.56 0 0 0 16.45 4H7.55ZM17.5 5.5A1 1 0 1 1 16.5 6.5A1 1 0 0 1 17.5 5.5ZM12 7A5 5 0 1 1 7 12A5 5 0 0 1 12 7ZM12 9A3 3 0 1 0 15 12A3 3 0 0 0 12 9Z"/>
          </svg>
        </a>
      </div>
    </section>

    <footer class="site-footer">
      <p>Silver SRLS - Via Carpine SNC - Sora (FR) - Cap: 03039 - P. IVA 02868000601</p>
      <p>
        web by
        <a
          href="https://www.instagram.com/_matteomarino/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Matteo Marino
        </a>
      </p>
    </footer>
  </main>
</body>
</html>
